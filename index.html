<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting & Business Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-glow: rgba(108, 99, 255, 0.4);
            --success: #00d4a0;
            --success-glow: rgba(0, 212, 160, 0.3);
            --danger: #ff4d6d;
            --danger-glow: rgba(255, 77, 109, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-primary: #f0f0ff;
            --text-secondary: rgba(240, 240, 255, 0.65);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1045 40%, #24243e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background bubbles */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            pointer-events: none;
            animation: floatBubble 10s ease-in-out infinite alternate;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #6c63ff, transparent);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ff4d6d, transparent);
            bottom: -80px;
            right: -80px;
            animation-delay: -5s;
        }

        @keyframes floatBubble {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(40px, 40px) scale(1.1);
            }
        }

        /* Header */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeDown 0.7s ease;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 6px;
        }

        /* Container */
        .container {
            max-width: 780px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 36px;
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Stats Boxes */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            margin-bottom: 28px;
        }

        .stat-box {
            padding: 14px 10px;
            text-align: center;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-box:hover {
            transform: translateY(-3px);
        }

        .stat-box span {
            display: block;
            font-size: 1.6rem;
            font-weight: 800;
            margin-top: 4px;
        }

        .correct-box {
            background: linear-gradient(135deg, rgba(0, 212, 160, 0.25), rgba(0, 212, 160, 0.08));
            border: 1px solid rgba(0, 212, 160, 0.4);
            color: var(--success);
            box-shadow: 0 0 20px rgba(0, 212, 160, 0.15);
        }

        .wrong-box {
            background: linear-gradient(135deg, rgba(255, 77, 109, 0.25), rgba(255, 77, 109, 0.08));
            border: 1px solid rgba(255, 77, 109, 0.4);
            color: var(--danger);
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.15);
        }

        .percent-box {
            background: linear-gradient(135deg, rgba(108, 99, 255, 0.25), rgba(108, 99, 255, 0.08));
            border: 1px solid rgba(108, 99, 255, 0.4);
            color: #a78bfa;
            box-shadow: 0 0 20px rgba(108, 99, 255, 0.15);
        }

        /* Progress bar */
        .progress-bar-wrap {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            height: 6px;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6c63ff, #a78bfa);
            border-radius: 50px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        /* Setup Screen */
        #setup-screen {
            text-align: center;
            animation: fadeUp 0.5s ease;
        }

        #setup-screen h2 {
            font-size: 1.7rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        #setup-screen p {
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        button {
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.25s ease;
            font-weight: 600;
        }

        .btn-main {
            padding: 12px 28px;
            background: linear-gradient(135deg, #6c63ff, #a78bfa);
            color: white;
            border-radius: 12px;
            font-size: 0.95rem;
            box-shadow: 0 4px 18px var(--primary-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-main::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 28px var(--primary-glow);
        }

        .btn-main:hover::after {
            opacity: 1;
        }

        .btn-main:active {
            transform: translateY(-1px);
        }

        .btn-main:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Quiz Screen */
        #quiz-screen {
            display: none;
        }

        .question-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .question-badge {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.07);
            padding: 5px 12px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .question-text {
            font-size: 1.15rem;
            margin-bottom: 22px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .options-grid {
            display: grid;
            gap: 10px;
        }

        .option {
            display: block;
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.22s ease;
            position: relative;
            overflow: hidden;
        }

        .option::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(108, 99, 255, 0.15), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .option:hover:not(.selected) {
            border-color: rgba(108, 99, 255, 0.6);
            background: rgba(108, 99, 255, 0.12);
            transform: translateX(4px);
            box-shadow: 0 0 15px rgba(108, 99, 255, 0.1);
        }

        .option:hover:not(.selected)::before {
            opacity: 1;
        }

        .option.selected {
            pointer-events: none;
        }

        .option.correct {
            background: rgba(0, 212, 160, 0.15);
            border-color: var(--success);
            color: #6effd9;
            box-shadow: 0 0 18px var(--success-glow);
        }

        .option.wrong {
            background: rgba(255, 77, 109, 0.15);
            border-color: var(--danger);
            color: #ff8fa3;
            box-shadow: 0 0 18px var(--danger-glow);
        }

        .option.revealed {
            border-color: var(--success);
            background: rgba(0, 212, 160, 0.1);
            color: #6effd9;
        }

        .nav-buttons {
            margin-top: 26px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }

        /* Result Screen */
        #result-screen {
            display: none;
            text-align: center;
            animation: fadeUp 0.5s ease;
        }

        #result-screen h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .score-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 24px auto;
            background: conic-gradient(#6c63ff var(--score-deg, 0deg), rgba(255, 255, 255, 0.07) 0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 40px var(--primary-glow);
        }

        .score-ring::before {
            content: '';
            position: absolute;
            width: 118px;
            height: 118px;
            border-radius: 50%;
            background: #1a1045;
        }

        .score-large {
            font-size: 2.2rem;
            font-weight: 800;
            color: #a78bfa;
            position: relative;
            z-index: 1;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 18px 0 28px;
            flex-wrap: wrap;
        }

        .result-stat-pill {
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
        }

        .pill-total {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .pill-correct {
            background: rgba(0, 212, 160, 0.15);
            border: 1px solid rgba(0, 212, 160, 0.4);
            color: #6effd9;
        }

        .pill-wrong {
            background: rgba(255, 77, 109, 0.15);
            border: 1px solid rgba(255, 77, 109, 0.4);
            color: #ff8fa3;
        }

        /* Footer */
        .footer {
            margin-top: 28px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            letter-spacing: 0.4px;
        }

        .footer span {
            font-weight: 700;
            background: linear-gradient(90deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--glass-border);
            margin: 24px 0;
        }

        /* Pulse animation on correct */
        @keyframes pulse-success {
            0% {
                box-shadow: 0 0 0 0 var(--success-glow);
            }

            70% {
                box-shadow: 0 0 0 10px transparent;
            }

            100% {
                box-shadow: 0 0 0 0 transparent;
            }
        }

        .option.correct {
            animation: pulse-success 0.5s ease;
        }

        /* Shake on wrong */
        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .option.wrong {
            animation: shake 0.3s ease;
        }

        @media (max-width: 520px) {
            .stats-container {
                grid-template-columns: repeat(3, 1fr);
            }

            .container {
                padding: 22px 16px;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="page-header">
        <h1>📚 Exam Preparation Hub</h1>
        <p>Accounting &amp; Business Organization MCQs</p>
    </div>

    <div class="container">
        <!-- Setup Screen -->
        <div id="setup-screen">
            <h2>Choose Your Quiz Size</h2>
            <p>Select how many MCQs you want to practice</p>
            <div class="btn-group">
                <button class="btn-main" onclick="startQuiz(10)">10 MCQs</button>
                <button class="btn-main" onclick="startQuiz(25)">25 MCQs</button>
                <button class="btn-main" onclick="startQuiz(50)">50 MCQs</button>
                <button class="btn-main" onclick="startQuiz(100)">100 MCQs</button>
                <button class="btn-main" onclick="startQuiz('all')">All MCQs</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen">
            <div class="stats-container">
                <div class="stat-box correct-box">✅ Correct<span id="stat-correct">0</span></div>
                <div class="stat-box wrong-box">❌ Wrong<span id="stat-wrong">0</span></div>
                <div class="stat-box percent-box">🎯 Score<span id="stat-percent">0</span>%</div>
            </div>

            <div class="progress-bar-wrap">
                <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
            </div>

            <div id="question-container">
                <div class="question-header">
                    <span class="question-badge" id="q-counter">Question 1 of 10</span>
                </div>
                <div class="question-text" id="q-text">Question goes here?</div>
                <div class="options-grid" id="options-container"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn-main" id="prev-btn" onclick="prevQuestion()">← Previous</button>
                <button class="btn-main" id="next-btn" onclick="nextQuestion()">Next →</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen">
            <h2>🏆 Quiz Complete!</h2>
            <div class="score-ring">
                <div class="score-large" id="final-score">0%</div>
            </div>
            <div class="result-stats">
                <div class="result-stat-pill pill-total" id="pill-total">Total: 0</div>
                <div class="result-stat-pill pill-correct" id="pill-correct">✅ Correct: 0</div>
                <div class="result-stat-pill pill-wrong" id="pill-wrong">❌ Wrong: 0</div>
            </div>
            <button class="btn-main" onclick="location.reload()">🔄 Restart Quiz</button>
        </div>
    </div>

    <div class="footer">
        Developed by <span>Ahsan Ahmed</span>
    </div>

            { q: "Loss decreases", a: "A", options: { A: "Capital", B: "Revenue", C: "Asset", D: "Liability" } },

            { q: "Buying goods on credit increases", a: "A", options: { A: "Creditors", B: "Debtors", C: "Capital", D: "Expense" } },
            { q: "Selling goods on credit increases", a: "A", options: { A: "Debtors", B: "Creditors", C: "Capital", D: "Expense" } },
            { q: "Business income is called", a: "A", options: { A: "Revenue", B: "Expense", C: "Liability", D: "Asset" } },
            { q: "Goods returned by customer is", a: "A", options: { A: "Sales return", B: "Purchase return", C: "Expense", D: "Asset" } },
            { q: "Goods returned to supplier is", a: "A", options: { A: "Purchase return", B: "Sales return", C: "Expense", D: "Asset" } },
            { q: "Profit =", a: "A", options: { A: "Income – Expense", B: "Expense – Income", C: "Asset – Liability", D: "Capital – Loan" } },
            { q: "Trial balance has", a: "A", options: { A: "Debit and credit columns", B: "One column", C: "Three columns", D: "No column" } },
            { q: "Balance sheet shows", a: "A", options: { A: "Assets and liabilities", B: "Sales", C: "Purchases", D: "Salary" } },
            { q: "Assets are", a: "A", options: { A: "Things owned by business", B: "Debts", C: "Expenses", D: "Income" } },
            { q: "Liabilities are", a: "A", options: { A: "Debts of business", B: "Goods", C: "Income", D: "Profit" } },
            { q: "Accounting period is usually", a: "A", options: { A: "One year", B: "One day", C: "One month", D: "Ten years" } },
            { q: "Book keeping records", a: "A", options: { A: "Transactions", B: "Workers", C: "Goods", D: "Markets" } },
            { q: "Accounting helps in", a: "A", options: { A: "Decision making", B: "Cooking", C: "Driving", D: "Painting" } }
        ];

        let quizData = [];
        let currentIdx = 0;
        let score = { correct: 0, wrong: 0 };
        let userAnswers = {};

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startQuiz(count) {
            let temp = [...allData];
            shuffle(temp);
            quizData = count === 'all' ? temp : temp.slice(0, count);
            quizData.forEach(item => {
                item.shuffledOptions = shuffle(Object.entries(item.options));
            });
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const item = quizData[currentIdx];
            document.getElementById('q-text').innerText = item.q;
            document.getElementById('q-counter').innerText = `Question ${currentIdx + 1} of ${quizData.length}`;

            // Progress bar
            const pct = ((currentIdx + 1) / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = pct + '%';

            const container = document.getElementById('options-container');
            container.innerHTML = '';

            item.shuffledOptions.forEach(([key, value]) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerText = value;

                if (userAnswers[currentIdx]) {
                    btn.classList.add('selected');
                    if (key === item.a) btn.classList.add('correct');
                    if (userAnswers[currentIdx] === key && key !== item.a) btn.classList.add('wrong');
                    if (userAnswers[currentIdx] !== item.a && key === item.a) btn.classList.add('revealed');
                } else {
                    btn.onclick = () => checkAnswer(key, btn);
                }
                container.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            document.getElementById('next-btn').innerText = currentIdx === quizData.length - 1 ? 'Finish 🏁' : 'Next →';
        }

        function checkAnswer(selectedKey, btn) {
            if (userAnswers[currentIdx]) return;

            const item = quizData[currentIdx];
            userAnswers[currentIdx] = selectedKey;

            const allButtons = document.querySelectorAll('.option');
            allButtons.forEach(b => b.classList.add('selected'));

            if (selectedKey === item.a) {
                btn.classList.add('correct');
                score.correct++;
            } else {
                btn.classList.add('wrong');
                score.wrong++;
                allButtons.forEach(b => {
                    const optKey = item.shuffledOptions.find(opt => opt[1] === b.innerText)[0];
                    if (optKey === item.a) b.classList.add('revealed');
                });
            }
            updateStats();
        }

        function updateStats() {
            const totalAnswered = score.correct + score.wrong;
            const percent = totalAnswered === 0 ? 0 : Math.round((score.correct / totalAnswered) * 100);
            document.getElementById('stat-correct').innerText = score.correct;
            document.getElementById('stat-wrong').innerText = score.wrong;
            document.getElementById('stat-percent').innerText = percent;
        }

        function nextQuestion() {
            if (currentIdx < quizData.length - 1) {
                currentIdx++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function prevQuestion() {
            if (currentIdx > 0) {
                currentIdx--;
                showQuestion();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').style.display = 'none';
            const rs = document.getElementById('result-screen');
            rs.style.display = 'block';

            const total = quizData.length;
            const percent = Math.round((score.correct / total) * 100);

            document.getElementById('final-score').innerText = percent + '%';
            document.getElementById('pill-total').innerText = `📋 Total: ${total}`;
            document.getElementById('pill-correct').innerText = `✅ Correct: ${score.correct}`;
            document.getElementById('pill-wrong').innerText = `❌ Wrong: ${score.wrong}`;

            // Animate score ring
            const deg = Math.round((percent / 100) * 360);
            document.querySelector('.score-ring').style.setProperty('--score-deg', deg + 'deg');
        }
    </script>
